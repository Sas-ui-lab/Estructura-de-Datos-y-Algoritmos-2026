
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .cake {
            width: 200px;
            height: 150px;
            background: #f7b731;
            margin: 20px auto;
            border-radius: 50% 50% 0 0;
            position: relative;
        }
        .candle {
            width: 10px;
            height: 40px;
            background: #ff6b6b;
            margin: 0 auto;
            position: absolute;
            top: -40px;
        }
        .flame {
            width: 20px;
            height: 30px;
            background: #ffd93d;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: -30px;
            left: -5px;
        }
        .message {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .name {
            font-size: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="message">¡Feliz Cumpleaños, Dayana!</div>
    <div class="cake">
        <div class="candle">
            <div class="flame"></div>
        </div>
    </div>
    <div class="name">Dayana</div>
</body>
</html>
